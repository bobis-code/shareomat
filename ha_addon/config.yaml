name: SELF LEG
version: "0.1.8"
slug: self_leg
description: LEG/ZEV — calculates local energy sharing.
url: https://github.com/bobis-code/self_leg
startup: application
boot: auto
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
host_network: false
hassio_api: false
homeassistant_api: false

map:
  - config:rw
  - share:rw

services:
  - mqtt:want

options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  base_topic: "self_leg"
  discovery_prefix: "homeassistant"
  command_topic_enabled: true
  community_id: "ZEV-001"
  community_name: "My Solar Community"
  local_rate_chf_kwh: 0.12
  grid_rate_chf_kwh: 0.28
  feed_in_rate_chf_kwh: 0.08
  timezone: "Europe/Zurich"
  log_level: "info"
  dry_run: false
  unknown_meter_policy: "skip"
  mqtt_tls: false
  mqtt_ca_cert: ""
  cron_schedule: ""
  auto_scan_enabled: false
  scan_interval_seconds: 60
  ingress_enabled: true
  share_inbox: ""
  email_enabled: false
  email_imap_host: "imap.gmail.com"
  email_imap_port: 993
  email_username: ""
  email_password: ""
  email_folder: "INBOX"
  email_allowed_senders: []
  email_poll_interval_seconds: 300
  metering_points:
    - mpid: "CH0012345678901234500000000000001"
      label: "PV Roof"
      role: "producer"
    - mpid: "CH0012345678901234500000000000002"
      label: "Apartment 1"
      role: "producer_consumer"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password?
  base_topic: str
  discovery_prefix: str
  command_topic_enabled: bool
  community_id: str
  community_name: str
  local_rate_chf_kwh: float
  grid_rate_chf_kwh: float
  feed_in_rate_chf_kwh: float
  timezone: str
  log_level: list(debug|info|warning|error)
  dry_run: bool
  unknown_meter_policy: list(fail|skip)
  mqtt_tls: bool
  mqtt_ca_cert: str
  cron_schedule: str
  auto_scan_enabled: bool
  scan_interval_seconds: int
  ingress_enabled: bool
  share_inbox: str
  email_enabled: bool
  email_imap_host: str
  email_imap_port: int
  email_username: str
  email_password: password?
  email_folder: str
  email_allowed_senders:
    - str
  email_poll_interval_seconds: int
  metering_points:
    - mpid: str
      label: str
      role: list(producer|consumer|producer_consumer)
