leg:
  community_id: "ZEV-001"
  name: "Example Solar Community"

participants:
  - participant_id: "house_1"
    label: "House 1"
    participant_type: "producer_consumer"
    active: true
  - participant_id: "house_2"
    label: "House 2"
    participant_type: "consumer"
    active: true

meters:
  - meter_id: "CH0000000000000000000000000000001"
    participant_id: "house_1"
    label: "House 1 main meter"
    role: "producer_consumer"
    active: true
  - meter_id: "CH0000000000000000000000000000002"
    participant_id: "house_2"
    label: "House 2 main meter"
    role: "consumer"
    active: true

tariffs:
  local_rate_chf_kwh: 0.12
  grid_rate_chf_kwh: 0.28
  feed_in_rate_chf_kwh: 0.08

paths:
  inbox: "data/inbox"
  archive: "data/archive"
  reports: "data/reports"
  state: "data/state"
  share_inbox: ""

processing:
  slot_minutes: 15
  archive_processed: true
  unknown_meter_policy: "fail"
  cron_schedule: ""
  auto_scan_enabled: false
  scan_interval_seconds: 60

mqtt:
  enabled: false
  broker: "localhost"
  port: 1883
  username: ""
  password: ""
  client_id: "shareomat"
  topic_prefix: "shareomat"
  discovery_prefix: "homeassistant"
  discovery_enabled: true
  command_topic_enabled: true
  qos: 1
  retain: true
  tls_enabled: false
  tls_ca_cert: ""

email:
  enabled: false
  imap_host: "imap.gmail.com"
  imap_port: 993
  username: ""
  password: ""
  folder: "INBOX"
  allowed_senders: []
  poll_interval_seconds: 300

ingress:
  enabled: false
  port: 8099
